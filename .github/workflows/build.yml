name: build

on:
  push:
    branches: [main]
    tags: ['v*']        # vX.Y.Z -> build everything and publish a GitHub Release (see the `release` job)
  pull_request:

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write        # keyless signing of the build-provenance attestation
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux,         os: ubuntu-latest,    gen: Ninja,                   bindir: build,         ext: "" }
          - { name: linux-aarch64, os: ubuntu-24.04-arm, gen: Ninja,                   bindir: build,         ext: "" }
          - { name: macos,         os: macos-latest,     gen: Ninja,                   bindir: build,         ext: "" }
          - { name: windows,       os: windows-2022,     gen: "Visual Studio 17 2022", bindir: build/Release, ext: ".exe" }
    steps:
      - uses: actions/checkout@v6

      # SDL3 is built from source (FetchContent). Install the X11 + Wayland dev headers so
      # SDL builds BOTH backends — it then picks one at runtime, so the binary runs under
      # either display server. SDL bundles its own Vulkan headers (no system Vulkan SDK
      # needed to build SDL_GPU). SDL hard-errors if SDL_X11=ON but X11 headers are absent.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxrender-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev libdrm-dev libgbm-dev

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install ninja

      # Compile check incl. the UI test suite + Test Engine (LSL_TESTS=ON, no LTO so the
      # link stays fast). The tests themselves need a GPU to run, so CI only builds them.
      - name: Build (with tests)
        run: >
          cmake -S . -B build-test -G "${{ matrix.gen }}"
          -DCMAKE_BUILD_TYPE=Release -DLSL_TESTS=ON &&
          cmake --build build-test --config Release --parallel

      # Shippable artifact: a static Release build (LTO on) — SDL3 + liblsl folded into the
      # executable, so each binary is self-contained (no SDL3/lsl libs to ship alongside).
      - name: Build (release, static)
        run: >
          cmake -S . -B build -G "${{ matrix.gen }}"
          -DCMAKE_BUILD_TYPE=Release -DLSL_STATIC=ON &&
          cmake --build build --config Release --parallel

      - name: Strip binaries (Unix)
        if: runner.os != 'Windows'
        run: strip ${{ matrix.bindir }}/lsl_viewer ${{ matrix.bindir }}/xdf_record

      # Flat portable package: binaries + licenses + a portable.txt marker, so unzipping and
      # running keeps config/recordings beside the executable (see docs/building.md).
      - name: Stage portable package
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.bindir }}/lsl_viewer${{ matrix.ext }}" "${{ matrix.bindir }}/xdf_record${{ matrix.ext }}" dist/
          cp LICENSE THIRD_PARTY_LICENSES packaging/portable.txt dist/

      # Provenance attestation: ties each binary's hash to this repo + workflow run + commit
      # (keyless, via GitHub OIDC + Sigstore). Verify with `gh attestation verify <file>`.
      # Only on pushes — fork PRs can't mint an id-token. Also only on public repos: the
      # attestation store rejects private repos without GHAS, so skip rather than fail there.
      - name: Attest build provenance
        if: github.event_name == 'push' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/lsl_viewer${{ matrix.ext }}
            dist/xdf_record${{ matrix.ext }}

      - name: Upload portable package
        uses: actions/upload-artifact@v7
        with:
          name: lsl-viewer-${{ matrix.name }}
          if-no-files-found: error
          path: dist/*

      # Windows also gets a conventional installer (Inno Setup is preinstalled on the runner):
      # Program Files install, Start-menu shortcut, uninstaller — no portable.txt, so it uses
      # the per-user locations. The portable .zip above is the no-install alternative.
      - name: Build Windows installer
        if: matrix.name == 'windows'
        run: |
          $ver = '${{ github.ref_name }}' -replace '^v', ''     # tag vX.Y.Z -> X.Y.Z
          if ($ver -notmatch '^\d') { $ver = '0.0.0' }          # non-tag (branch) build -> obvious 0.0.0
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$ver" packaging\lsl-viewer.iss

      - name: Attest installer provenance
        if: matrix.name == 'windows' && github.event_name == 'push' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: lsl-viewer-setup.exe

      - name: Upload Windows installer
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: lsl-viewer-windows-installer
          if-no-files-found: error
          path: lsl-viewer-setup.exe

      # macOS gets a .dmg: a .app bundle (icon from packaging/lsl-viewer.png) in a drag-to-
      # Applications disk image. Unsigned (FreeCAD-style), so the first launch needs a
      # right-click > Open, or: xattr -dr com.apple.quarantine "LSL Viewer.app".
      - name: Build macOS .dmg
        if: matrix.name == 'macos'
        run: |
          set -e
          mkdir icon.iconset
          for sz in 16 32 128 256 512; do
            sips -z $sz $sz             packaging/lsl-viewer.png --out icon.iconset/icon_${sz}x${sz}.png
            sips -z $((sz*2)) $((sz*2)) packaging/lsl-viewer.png --out icon.iconset/icon_${sz}x${sz}@2x.png
          done
          iconutil -c icns icon.iconset -o lsl_viewer.icns
          APP="LSL Viewer.app"                       # binary is static; only system frameworks remain
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp build/lsl_viewer "$APP/Contents/MacOS/"
          cp packaging/Info.plist "$APP/Contents/"
          cp lsl_viewer.icns "$APP/Contents/Resources/"
          ver="${GITHUB_REF_NAME#v}"; [[ "$ver" =~ ^[0-9] ]] || ver="0.0.0"   # tag vX.Y.Z -> X.Y.Z, else obvious 0.0.0
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $ver" \
                                  -c "Set :CFBundleShortVersionString $ver" "$APP/Contents/Info.plist"
          mkdir dmgroot
          cp -R "$APP" dmgroot/
          ln -s /Applications dmgroot/Applications     # drag-to-install target
          cp build/xdf_record dmgroot/                 # headless recorder CLI, beside the app
          cp LICENSE THIRD_PARTY_LICENSES dmgroot/
          hdiutil create -volname "LSL Viewer" -srcfolder dmgroot -ov -format UDZO LSL-Viewer.dmg

      - name: Attest dmg provenance
        if: matrix.name == 'macos' && github.event_name == 'push' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: LSL-Viewer.dmg

      - name: Upload macOS .dmg
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v7
        with:
          name: lsl-viewer-macos-dmg
          if-no-files-found: error
          path: LSL-Viewer.dmg

  # Portable single-file Linux build. Built on an older Ubuntu (older glibc) so it runs on
  # a wide range of distros, and packaged as an AppImage with a desktop entry + icon. SDL
  # dlopens the display-server libs at runtime, so the host provides X11/Wayland + the GPU
  # driver/Vulkan loader (always system components) — the AppImage carries the rest.
  appimage:
    name: appimage-${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,     arch: x86_64 }
          - { os: ubuntu-22.04-arm, arch: aarch64 }
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write        # keyless signing of the build-provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build file \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxfixes-dev libxss-dev libxrender-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev libdrm-dev libgbm-dev

      - name: Build (release, static, X11 + Wayland)
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DLSL_STATIC=ON
          cmake --build build --parallel

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/doc/lsl_viewer
          cp build/lsl_viewer build/xdf_record AppDir/usr/bin/
          strip AppDir/usr/bin/lsl_viewer AppDir/usr/bin/xdf_record
          cp LICENSE THIRD_PARTY_LICENSES AppDir/usr/share/doc/lsl_viewer/

      - name: Package AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.arch }}.AppImage
          chmod +x linuxdeploy-${{ matrix.arch }}.AppImage
          export APPIMAGE_EXTRACT_AND_RUN=1   # runners have no FUSE
          ./linuxdeploy-${{ matrix.arch }}.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/lsl_viewer \
            --desktop-file packaging/lsl-viewer.desktop \
            --icon-file packaging/lsl-viewer.png \
            --output appimage
          rm -f linuxdeploy-${{ matrix.arch }}.AppImage   # drop the tool, leaving only the output
          mv ./*.AppImage LSL-Viewer-${{ matrix.arch }}.AppImage

      - name: Attest build provenance
        if: github.event_name == 'push' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: LSL-Viewer-${{ matrix.arch }}.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: lsl-viewer-appimage-${{ matrix.arch }}
          if-no-files-found: error
          path: LSL-Viewer-${{ matrix.arch }}.AppImage

  # Fully-static headless recorder. Built CLI-only (LSL_CLI_ONLY skips the GUI deps) against musl
  # via zig as the C/C++ toolchain, then `-static` — so xdf_record has NO glibc / no shared-library
  # dependencies and runs on any Linux (old glibc, Alpine/musl, containers) as a single file. The
  # viewer can't be static (it needs the host's GPU driver + display libs at runtime), so it's not
  # built here. Runs on a normal (glibc) runner so the checkout/upload actions work — zig cross-
  # compiles to musl regardless of host.
  xdf-record-musl:
    name: xdf_record-linux-musl
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - name: Install zig
        run: |
          curl -fsSL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar -xJ
          echo "ZIG=$PWD/zig-linux-x86_64-0.13.0/zig" >> "$GITHUB_ENV"
      - name: Toolchain wrappers (zig as cc/c++/ar/ranlib targeting musl)
        run: |
          mkdir -p z
          printf '#!/bin/sh\nexec "$ZIG" cc  -target x86_64-linux-musl "$@"\n' > z/zcc
          printf '#!/bin/sh\nexec "$ZIG" c++ -target x86_64-linux-musl "$@"\n' > z/zxx
          printf '#!/bin/sh\nexec "$ZIG" ar "$@"\n'     > z/zar
          printf '#!/bin/sh\nexec "$ZIG" ranlib "$@"\n' > z/zranlib
          chmod +x z/*
      - name: Build (fully static, CLI only)
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DLSL_CLI_ONLY=ON -DLSL_STATIC=ON \
            -DCMAKE_C_COMPILER="$PWD/z/zcc"   -DCMAKE_CXX_COMPILER="$PWD/z/zxx" \
            -DCMAKE_AR="$PWD/z/zar"           -DCMAKE_RANLIB="$PWD/z/zranlib" \
            -DCMAKE_C_COMPILER_AR="$PWD/z/zar"        -DCMAKE_CXX_COMPILER_AR="$PWD/z/zar" \
            -DCMAKE_C_COMPILER_RANLIB="$PWD/z/zranlib" -DCMAKE_CXX_COMPILER_RANLIB="$PWD/z/zranlib" \
            -DCMAKE_EXE_LINKER_FLAGS="-static"
          cmake --build build --target xdf_record --parallel
          strip build/xdf_record
      - name: Verify fully static
        run: |
          file build/xdf_record
          ldd build/xdf_record || true        # expect: "not a dynamic executable"
      - name: Stage
        run: |
          mkdir -p dist
          cp build/xdf_record LICENSE THIRD_PARTY_LICENSES dist/
      - name: Attest build provenance
        if: github.event_name == 'push' && github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/xdf_record
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: xdf-record-linux-musl
          if-no-files-found: error
          path: dist/*

  # Recording conformance: record the mock streams with our headless recorder AND the real
  # LabRecorder (LabRecorderCLI) at once, and check the two XDFs hold identical data. Both
  # are CLI/headless, so this runs without a display. Pinned to ubuntu-24.04 to match the
  # 'noble' LabRecorder/liblsl .deb packages installed below.
  conformance:
    name: recording-vs-labrecorder
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install build deps + LabRecorder + liblsl
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev libdrm-dev libgbm-dev
          # The LabRecorder .deb bundles its own liblsl.so (used by both LabRecorderCLI and
          # pylsl), so install just it — a separate liblsl .deb would clash on /usr/lib/liblsl.so.
          curl -fsSL -o /tmp/labrec.deb https://github.com/labstreaminglayer/App-LabRecorder/releases/download/v1.17.1/LabRecorder-1.17.0-noble_amd64.deb
          sudo apt-get install -y /tmp/labrec.deb

      # Only the headless recorder is needed; LSL_CLI_ONLY skips configuring SDL/ImGui entirely.
      - name: Build xdf_record
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DLSL_CLI_ONLY=ON
          cmake --build build --target xdf_record --parallel

      - name: Install Python deps
        run: python3 -m pip install --break-system-packages --quiet pyxdf pylsl numpy

      - name: Compare our recorder vs LabRecorder
        run: |
          # Resolve LSL streams over loopback (CI runners have no usable multicast).
          printf '[lab]\nKnownPeers = {127.0.0.1}\n[multicast]\nResolveScope = link\n' > lsl_api.cfg
          export LSLAPICFG="$PWD/lsl_api.cfg" XDF_RECORD="$PWD/build/xdf_record"
          python3 tests/compare_labrecorder.py

  # On a version tag (vX.Y.Z) gather every build artifact and publish them as a GitHub Release.
  # Single-file artifacts (.dmg / installer .exe / .AppImage) attach directly; multi-file bundles
  # (the portable per-OS folders, the musl recorder) are zipped first. Uses the gh CLI (first-party,
  # always current on the runner) so there are no version-pinned third-party actions to break.
  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, appimage, xdf-record-musl]      # the artifact producers (build runs the UI tests)
    runs-on: ubuntu-latest
    permissions:
      contents: write                              # create the release + upload assets
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download this run's artifacts
        run: gh run download "${{ github.run_id }}" --dir dl --repo "${{ github.repository }}"
      - name: Assemble release assets
        run: |
          mkdir -p assets
          for d in dl/*/; do
            name="$(basename "$d")"
            if [ "$(find "$d" -maxdepth 1 -type f | wc -l)" -eq 1 ]; then
              cp "$d"/* assets/                                            # one file -> attach as-is
            else
              (cd "$d" && zip -qr "$GITHUB_WORKSPACE/assets/${name}.zip" .)  # bundle -> one .zip
            fi
          done
          ls -la assets
      - name: Publish release
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" --repo "${{ github.repository }}" --title "$TAG" --generate-notes assets/* \
            || gh release upload "$TAG" --repo "${{ github.repository }}" --clobber assets/*
